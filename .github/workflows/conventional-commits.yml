name: Conventional commits

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check conventional commits
        uses: webiny/action-conventional-commits@v1.3.1

      - name: Send failure email
        if: failure()
        run: |
          npm install nodemailer
          node .github/scripts/send-fail-email.js
        env:
          ETHEREAL_USER: ${{ secrets.ETHEREAL_USER }}
          ETHEREAL_PASS: ${{ secrets.ETHEREAL_PASS }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}

      - name: Close PR on failure
        if: failure()
        run: |
          gh pr close ${{ github.event.pull_request.number }} --comment 'Closed: commit messages do not follow Conventional Commits.'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

