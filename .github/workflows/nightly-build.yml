name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *"  # midnight UTC every day
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:nightly .

      - name: Run tests inside container
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:nightly \
            sh -c "pip install pytest pytest-asyncio anyio[asyncio] --quiet && pytest src/tests/ -v"

      - name: Push to Docker Hub
        if: success() && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:nightly

      - name: Send failure email
        if: failure()
        run: |
          npm install @sendgrid/mail
          node .github/scripts/send-nightly-fail-email.js
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
